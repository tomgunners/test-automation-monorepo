# ── Workflow reutilizável — Mobile Tests (Android 14) ─────────────────────────
# Chamado pelo orquestrador ci.yml via workflow_call.
#
# Credenciais do app (STANDARD_USER, STANDARD_PASSWORD, etc.) são lidas
# diretamente do arquivo mobile-tests/.env commitado no repositório.
# Por ser um app de demonstração com credenciais públicas, não são secrets.

name: Mobile Tests

on:
  workflow_call:   # chamado pelo ci.yml
  workflow_dispatch: # disparo manual independente

env:
  NODE_VERSION: '20'
  APK_VERSION:  v2.0.0
  APK_NAME:     wdio-native-demo-app.apk
  APK_PATH:     mobile-tests/apps/wdio-native-demo-app.apk

jobs:
  mobile-android:
    name: Mobile Tests – Android 14
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-nm
        with:
          path: |
            node_modules
            mobile-tests/node_modules
            shared/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: mobile-node-modules-${{ runner.os }}-

      - name: Instalar dependências
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      # ── Configurar path do APK no container ─────────────────────────────────
      # Acrescenta ANDROID_APP_CONTAINER_PATH ao .env existente para que o
      # wdio.android.conf.ts resolva o caminho do APK dentro do container.
      - name: Configurar ANDROID_APP_CONTAINER_PATH no .env
        working-directory: mobile-tests
        run: echo "ANDROID_APP_CONTAINER_PATH=/apps/${APK_NAME}" >> .env

      # ── Cache e download do APK ────────────────────────────────────────────
      - name: Cache APK
        uses: actions/cache@v4
        id: cache-apk
        with:
          path: mobile-tests/apps
          key: apk-${{ runner.os }}-${{ env.APK_VERSION }}

      - name: Download APK
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: |
          mkdir -p mobile-tests/apps
          curl -L -o "$APK_PATH" \
            "https://github.com/webdriverio/native-demo-app/releases/download/${APK_VERSION}/android.wdio.native.app.${APK_VERSION}.apk"

      - name: Validar APK
        run: |
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK não encontrado em $APK_PATH"
            exit 1
          fi
          echo "✅ APK encontrado:"
          ls -lh mobile-tests/apps

      # ── KVM + ADB ──────────────────────────────────────────────────────────
      - name: Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Instalar adb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y android-tools-adb
          adb version

      # ── Subir docker-android ───────────────────────────────────────────────
      - name: Iniciar docker-android (Android 14 + Appium)
        working-directory: mobile-tests
        run: docker compose up -d

      - name: Debug APK no container
        run: |
          echo "=== Host ==="
          ls -lh mobile-tests/apps
          CONTAINER_ID=$(docker ps -q | head -n 1)
          echo "Container ID: $CONTAINER_ID"
          docker exec "$CONTAINER_ID" ls -lh /apps || echo "/apps não encontrado no container"

      # ── Aguardar emulador e Appium ─────────────────────────────────────────
      - name: Aguardar boot do emulador Android
        timeout-minutes: 8
        run: |
          adb wait-for-device
          until adb shell getprop sys.boot_completed 2>/dev/null | grep -m 1 '1'; do
            echo "Aguardando boot completo..."
            sleep 5
          done
          adb shell input keyevent 82
          echo "✅ Emulador pronto"

      - name: Aguardar Appium
        working-directory: mobile-tests
        run: node scripts/wait-for-appium.js
        env:
          APPIUM_HOST:    127.0.0.1
          APPIUM_PORT:    4723
          APPIUM_WAIT_MS: 300000
          APPIUM_POLL_MS: 5000

      # ── Executar testes ────────────────────────────────────────────────────
      # Credenciais e configurações do app lidas do mobile-tests/.env.
      # Apenas variáveis de infraestrutura (Appium, Android) são definidas aqui.
      - name: Executar testes Mobile
        working-directory: mobile-tests
        run: yarn test:android
        env:
          APPIUM_HOST:              127.0.0.1
          APPIUM_PORT:              4723
          ANDROID_PLATFORM_VERSION: '14'
          ANDROID_DEVICE_NAME:      emulator-5554
          ELEMENT_TIMEOUT:          20000
          TEST_TIMEOUT:             180000
          APPIUM_COMMAND_TIMEOUT:   300

      - name: Stop docker-android
        if: always()
        working-directory: mobile-tests
        run: docker compose down

      # ── Artefatos ──────────────────────────────────────────────────────────
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-allure-results-${{ github.run_number }}
          path: mobile-tests/allure-results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload screenshots de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots-${{ github.run_number }}
          path: mobile-tests/reports/screenshots/
          if-no-files-found: ignore
          retention-days: 7
