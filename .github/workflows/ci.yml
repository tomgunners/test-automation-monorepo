name: Test Automation Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Qual suíte executar?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - web
          - api
          - performance
      web_profile:
        description: 'Projeto Web E2E'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - smoke
          - regression
      perf_mode:
        description: 'Modo de performance'
        required: false
        default: 'gate'
        type: choice
        options:
          - gate        # quebra o pipeline se os thresholds falharem
          - informative # apenas reporta, nunca quebra
      perf_profile:
        description: 'Projeto K6 Performance'
        required: false
        default: 'load'
        type: choice
        options:
          - load
          - spike
          - soak

env:
  NODE_VERSION: '20'

jobs:
  tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: API Tests
            suite: api
            path: api-tests
            script: test:api

          - name: Web Tests (smoke)
            suite: web
            path: web-tests
            script: test:smoke

          - name: Web Tests (regression)
            suite: web-regression
            path: web-tests
            script: test:regression

          - name: Performance Tests
            suite: performance
            path: performance-tests
            script: test:perf

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Setup Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      # ─── Cache node_modules ─────────────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
            ${{ matrix.path }}/node_modules
          key: ${{ matrix.suite }}-node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ matrix.suite }}-node-modules-${{ runner.os }}-

      # ─── Instalar dependências ───────────────────────────────────────────────
      - name: Instalar dependências
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      # ─── Instalar k6 (apenas performance) ───────────────────────────────────
      - name: Instalar k6
        if: matrix.suite == 'performance'
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      # ─── Cache Playwright browsers (apenas web) ──────────────────────────────
      - name: Cache Playwright browsers
        if: startsWith(matrix.suite, 'web')
        uses: actions/cache@v4
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # ─── Instalar browsers do Playwright (apenas web) ────────────────────────
      - name: Instalar Playwright browsers
        if: startsWith(matrix.suite, 'web') && steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # ─── Instalar Allure CLI (apenas web) ────────────────────────────────────
      - name: Instalar Allure CLI
        if: startsWith(matrix.suite, 'web')
        run: npm install -g allure-commandline

      # ─── Executar testes ─────────────────────────────────────────────────────
      - name: Executar testes
        if: >
          github.event.inputs.test_suite == matrix.suite ||
          github.event.inputs.test_suite == 'all' ||
          github.event_name != 'workflow_dispatch'
        run: |
          if [ "${{ matrix.suite }}" = "performance" ]; then
            MODE="${{ github.event.inputs.perf_mode || 'informative' }}"
            if [ "$MODE" = "informative" ]; then
              yarn workspace performance-tests test:informative
            else
              yarn workspace performance-tests test:gate
            fi
          else
            yarn ${{ matrix.script }}
          fi
        env:
          BASE_URL: https://www.saucedemo.com
          # HEADLESS=true → sem janela no CI (correto: true = headless, sem inversão)
          HEADLESS: 'true'
          BROWSER: chromium
          API_BASE_URL: https://dummyjson.com
          STAGES_PROFILE: ${{ github.event.inputs.perf_profile || 'load' }}

      # ─── Gerar relatório Allure (apenas web) ─────────────────────────────────
      - name: Gerar relatório Allure
        if: always() && startsWith(matrix.suite, 'web')
        run: yarn workspace web-tests run allure:generate

      # ─── Upload de artefatos ─────────────────────────────────────────────────
      - name: Upload artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.suite }}-${{ github.run_id }}
          path: |
            ${{ matrix.path }}/allure-report/**
            ${{ matrix.path }}/allure-results/**
            ${{ matrix.path }}/test-results/**
            ${{ matrix.path }}/reports/**
            ${{ matrix.path }}/results/**
          if-no-files-found: warn
          retention-days: 30

  # ─── Publish Allure Report no GitHub Pages ───────────────────────────────────
  publish-allure:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: tests
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: write
      pages: write
      id-token: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Limpar deployments antigos
        uses: strumwolf/delete-deployment-environment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true

      - name: Download Allure report (smoke)
        uses: actions/download-artifact@v4
        with:
          name: results-web-${{ github.run_id }}
          path: allure-combined
        continue-on-error: true

      - name: Listar arquivos baixados
        run: find allure-combined -type f | head -30 || echo "Nenhum arquivo encontrado"

      - name: Publish no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-combined/allure-report
          destination_dir: allure-report
          keep_files: false
