# ── Workflow reutilizável — Performance Tests ─────────────────────────────────
#
# Chamado pelo orquestrador ci.yml via workflow_call.
# BASE_URL aponta exclusivamente para dummyjson.com.
#
# ── Estratégia de perfis no CI ────────────────────────────────────────────────
#
#   smoke (padrão automático) → 2 VUs / 30s
#     Roda em todo push/PR. Verifica que os endpoints respondem corretamente
#     sem impor carga real. Rápido (~1min) e não bloqueia o pipeline.
#
#   load | spike | soak (sob demanda via workflow_dispatch)
#     Perfis de carga real, disparados manualmente quando necessário.
#     Podem quebrar o pipeline se thresholds falharem (modo gate).

name: Performance Tests

on:
  workflow_call:
    inputs:
      perf_mode:
        description: 'gate (quebra pipeline) ou informative (só reporta)'
        type: string
        default: 'informative'
      perf_profile:
        description: 'Perfil k6: smoke | load | spike | soak'
        type: string
        default: 'smoke'
  workflow_dispatch:
    inputs:
      perf_mode:
        description: 'Modo de execução'
        required: false
        default: 'informative'
        type: choice
        options:
          - gate        # quebra o pipeline se os thresholds falharem
          - informative # apenas reporta, nunca quebra
      perf_profile:
        description: 'Perfil k6'
        required: false
        default: 'smoke'
        type: choice
        options: [smoke, load, spike, soak]

env:
  NODE_VERSION: '20'

jobs:
  performance-tests:
    name: Performance Tests (k6 — ${{ inputs.perf_profile || 'smoke' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-nm
        with:
          path: |
            node_modules
            performance-tests/node_modules
          key: perf-node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: perf-node-modules-${{ runner.os }}-

      - name: Instalar dependências
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Instalar k6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      # ── Execução ───────────────────────────────────────────────────────────────
      #
      # Perfil smoke: sempre usa test:smoke (sem thresholds de throughput pesados)
      # Outros perfis: gate quebra pipeline; informative apenas reporta
      - name: Executar testes de Performance
        run: |
          PROFILE="${{ inputs.perf_profile || 'smoke' }}"
          MODE="${{ inputs.perf_mode || 'informative' }}"

          if [ "$PROFILE" = "smoke" ]; then
            echo "Perfil: smoke (sanity check — 2 VUs / 30s)"
            yarn workspace performance-tests test:smoke
          elif [ "$MODE" = "gate" ]; then
            echo "Perfil: $PROFILE (gate — quebra se thresholds falharem)"
            yarn workspace performance-tests test:gate
          else
            echo "Perfil: $PROFILE (informative — apenas reporta)"
            yarn workspace performance-tests test:informative
          fi
        env:
          BASE_URL:       https://dummyjson.com
          STAGES_PROFILE: ${{ inputs.perf_profile || 'smoke' }}

      - name: Upload resultados k6
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-performance-${{ github.run_id }}
          path: performance-tests/results/**
          if-no-files-found: warn
          retention-days: 30
